name: CD - Build, Push and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v6

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mi-app:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/mi-app:latest
      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/mi-app:${{ github.sha }}
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    # ESTO ES LO MÁS IMPORTANTE: Define qué secretos usar
    environment: production

    steps:
      - name: Desplegar en produccion
        uses: appleboy/ssh-action@v1.0.0
        with:
          # GitHub automáticamente buscará estos en el entorno 'production'
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Definimos la imagen usando el secreto del entorno
            IMAGE="${{ secrets.DOCKER_USERNAME }}/mi-app:latest"

            docker pull $IMAGE
            docker stop mi-app || true
            docker rm mi-app || true
            docker run -d --name mi-app --restart unless-stopped -p 80:3000 $IMAGE

            # Limpieza opcional
            docker system prune -f
